[profile.default]
src = "contracts/solidity"
out = "out"
libs = ["lib"]
test = "contracts/test"
solc = "0.8.24"

optimizer = true
optimizer_runs = 200

# ENS vendored contracts live under contracts/solidity/vendored/. Real source
# will be copied in during Phase 1 from a pinned ensdomains/ens-contracts commit
# — see contracts/solidity/vendored/README.md.
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@ensdomains/=contracts/solidity/vendored/",
]
